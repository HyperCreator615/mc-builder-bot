name: 24/7 Minecraft AI Bot
on:
  workflow_dispatch:
    inputs:
      ip: { required: true }
      port: { required: true }
      name: { required: true }
      apiKey: { required: true }
      model: { required: true }
  repository_dispatch:
    types: [spawn_bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Tools
        run: npm install mineflayer node-fetch@2
      - name: Launch Bot
        run: node bot.js
        env:
          MC_IP: ${{ github.event.inputs.ip || github.event.client_payload.ip }}
          MC_PORT: ${{ github.event.inputs.port || github.event.client_payload.port }}
          BOT_NAME: ${{ github.event.inputs.name || github.event.client_payload.name }}
          AI_KEY: ${{ github.event.inputs.apiKey || github.event.client_payload.apiKey }}
          AI_MODEL: ${{ github.event.inputs.model || github.event.client_payload.model }}
